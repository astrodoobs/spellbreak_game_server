[Proxy]
listen_host    = 0.0.0.0
listen_port    = 7777
game_host      = 127.0.0.1
game_port      = 7778
session_timeout = 120
require_auth   = false

[Database]
path = /spellbreak-server/data/elefrac.db

[GameServer]
exe_path             = /spellbreak-server/BaseServer/g3/Binaries/Win64/g3Server-Win64-Test.exe
; Map URL and game mode as one arg — UE4 expects "MapName?game=Mode"
args                 = Alpha_Resculpt?game=solos -NetServerMaxTickRate=30
gamemode             =
log_path             = /spellbreak-server/BaseServer/g3/Saved/Logs/g3.log
port                 = 7778
restart_on_match_end = true
idle_restart_minutes = 30
use_wine             = true

[MatchTracker]
; Leave state_file blank to poll match_tracker.dll via TCP on tracker_port instead
state_file    =
port          = 4951
poll_interval = 2.0

[Broadcast]
host = 0.0.0.0
port = 8777

[Control]
host     = 0.0.0.0
port     = 3387
; Empty password so the Discord bot can connect without AUTH
password =
